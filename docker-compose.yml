services:

  app:
    build: .
    container_name: retail-app

    ports:
      - "3000:3000"

    networks:
      - frontend-network

    depends_on:
      - gateway

  gateway:
    image: nginx:latest
    container_name: retail-gateway

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

    networks:
      - frontend-network
      - backend-network

  database:
    image: mysql:8
    container_name: retail-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: inventory_db

    ports:
      - "3306:3306"

    networks:
      - backend-network

    volumes:
      - mysql-data:/var/lib/mysql

networks:
  frontend-network:
  backend-network:

volumes:
  mysql-data:
